<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Verification -->
  <meta name="google-site-verification" content="dIx16ng-LhFiORuo7tf3mQPXkiq_owIN0ClCpeiKELw" />

  <!-- SEO Title -->
  <title>Dharmik Panchani | MERN Stack Developer</title>

  <!-- Basic SEO -->
  <meta name="title" content="Dharmik Panchani | MERN Stack Developer" />

  <meta name="keywords"
    content="Dharmik Panchani, MERN Stack Developer, React Developer, Node.js Developer, JavaScript Developer, Frontend Developer, Web Developer" />

  <meta name="author" content="Dharmik Panchani" />
  <meta name="robots" content="index, follow, max-snippet:0">

  <!-- Open Graph (Social Preview) -->
  <meta property="og:title" content="Dharmik Panchani | MERN Stack Developer" />
  <meta property="og:description"
    content="I'm a MERN Stack Developer specializing in modern web development using React, Node.js, MongoDB, Redux and JavaScript." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dharmikpanchani.github.io" />
  <meta property="og:image" content="https://dharmikpanchani.github.io/dharmik.jpg" />
  <meta property="og:site_name" content="Dharmik Panchani Portfolio" />

  <!-- Twitter Preview -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Dharmik Panchani | MERN Stack Developer" />
  <meta name="twitter:description"
    content="Portfolio of Dharmik Panchani – MERN Stack Developer building modern and scalable web applications." />
  <meta name="twitter:image" content="https://dharmikpanchani.github.io/dharmik.jpg" />

  <!-- Structured Data (Schema Markup for Google) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Dharmik Panchani",
    "url": "https://dharmikpanchani.github.io",
    "image": "https://dharmikpanchani.github.io/dharmik.jpg",
    "jobTitle": "MERN Stack Developer",
    "sameAs": [
      "https://github.com/Dharmikpanchani",
      "https://www.linkedin.com/in/dharmikpanchani"
    ]
  }
  </script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Apply saved theme before React renders -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
